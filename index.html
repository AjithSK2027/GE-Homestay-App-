<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Good Earth Homestay</title>

<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

    <!-- HEADER -->

    <header class="topbar">

        <div>
            <h1>Good Earth</h1>
            <p id="todayDate"></p>
        </div>

        <button class="icon-btn">
            <i data-lucide="bell"></i>
        </button>

    </header>

    <!-- DASHBOARD -->

    <main id="dashboardPage">

        <section class="hero-card">

            <div class="hero-left">

                <span class="hero-label">
                    Occupancy
                </span>

                <h2 id="occupancyCount">
                    0 / 8
                </h2>

                <p>
                    Rooms Occupied
                </p>

            </div>

            <div class="hero-ring">

                <div class="ring-value">
                    0%
                </div>

            </div>

        </section>

        <!-- STATS -->

        <section class="stats-grid">

            <div class="stat-card revenue">

                <i data-lucide="indian-rupee"></i>

                <span>
                    Revenue
                </span>

                <h3>
                    ₹0
                </h3>

            </div>

            <div class="stat-card pending">

                <i data-lucide="wallet"></i>

                <span>
                    Pending
                </span>

                <h3>
                    ₹0
                </h3>

            </div>

            <div class="stat-card checkout">

                <i data-lucide="door-open"></i>

                <span>
                    Checkouts
                </span>

                <h3>
                    0
                </h3>

            </div>

            <div class="stat-card guests">

                <i data-lucide="users"></i>

                <span>
                    Guests
                </span>

                <h3>
                    0
                </h3>

            </div>

        </section>

        <!-- ROOM SECTION -->

        <section class="section-title">

            <h3>Rooms</h3>

        </section>

        <section
        id="roomGrid"
        class="room-grid">

        </section>

    </main>

</div>

<!-- FAB -->

<button
id="fab"
class="fab">

<i data-lucide="plus"></i>

</button>

<!-- CHECKIN MODAL -->

<div
id="checkinModal"
class="modal">

<div class="modal-sheet">

    <div class="sheet-header">

        <h3>
            New Check-In
        </h3>

        <button
        class="close-modal">

            <i data-lucide="x"></i>

        </button>

    </div>

    <form id="checkinForm">

        <input
        type="text"
        placeholder="Guest Name"
        id="guestName">

        <input
        type="tel"
        placeholder="Phone Number"
        id="phoneNumber">

        <input
        type="number"
        placeholder="Guests"
        id="guestCount">

        <select id="roomSelect">
            <option>
                Select Room
            </option>
        </select>

        <input
        type="number"
        placeholder="Nights"
        id="nights">

        <select id="mealPlan">

            <option value="EP">
                EP
            </option>

            <option value="CP">
                CP
            </option>

            <option value="MAP">
                MAP
            </option>

            <option value="AP">
                AP
            </option>

        </select>

        <input
        type="number"
        placeholder="Advance Paid"
        id="advancePaid">

        <select id="paymentMode">

            <option value="">
                Payment Mode
            </option>

            <option value="UPI">
                UPI
            </option>

            <option value="Cash">
                Cash
            </option>

            <option value="Card">
                Card
            </option>

        </select>

        <textarea
        id="notes"
        placeholder="Notes"></textarea>

        <button
        type="submit"
        class="primary-btn">

            Check In

        </button>

    </form>

</div>

</div>

<!-- BOTTOM NAV -->

<nav class="bottom-nav">

<button class="nav-item active">

<i data-lucide="hotel"></i>

<span>
Dashboard
</span>

</button>

<button class="nav-item">

<i data-lucide="bed-double"></i>

<span>
Rooms
</span>

</button>

<button class="nav-item">

<i data-lucide="bar-chart-3"></i>

<span>
Reports
</span>

</button>

<button class="nav-item">

<i data-lucide="settings"></i>

<span>
Settings
</span>

</button>

</nav>

<script src="api.js"></script>
<script src="dashboard.js"></script>
<script src="checkin.js"></script>
<script src="checkout.js"></script>
<script src="app.js"></script>

<script>
lucide.createIcons();
</script>

</body>
</html>
